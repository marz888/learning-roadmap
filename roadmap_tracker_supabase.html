<html lang="en">

<head>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <meta name="mobile-web-app-capable" content="yes">
  <title>Roadmap Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      font-size: 14px;
      background: #fff;
      color: #1a1a1a;
      padding: 1rem;
      padding-top: max(1rem, env(safe-area-inset-top));
      padding-bottom: max(4rem, env(safe-area-inset-bottom));
      padding-left: max(1rem, env(safe-area-inset-left));
      padding-right: max(1rem, env(safe-area-inset-right));
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
    }

    h1 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: .2rem;
      color: #1a1a1a;
      letter-spacing: -.3px;
    }

    .subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 1.1rem;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 1rem;
    }

    .metric {
      background: #f5f5f3;
      border-radius: 10px;
      padding: .75rem .875rem;
    }

    .metric-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 3px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -.5px;
    }

    .controls {
      display: flex;
      gap: 6px;
      margin-bottom: .875rem;
      align-items: center;
      flex-wrap: wrap;
      -webkit-overflow-scrolling: touch;
    }

    .filter-btn {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 0.5px solid #ccc;
      background: transparent;
      color: #888;
      cursor: pointer;
      min-height: 32px;
      font-family: inherit;
      -webkit-appearance: none;
    }

    .filter-btn.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .save-status {
      font-size: 11px;
      color: #aaa;
      margin-left: auto;
    }

    .week-block {
      margin-bottom: .75rem;
      border: 0.5px solid #e0e0e0;
      border-radius: 14px;
      overflow: hidden;
    }

    .week-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      background: #f5f5f3;
      cursor: pointer;
      user-select: none;
      min-height: 44px;
    }

    .week-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      flex: 1;
      letter-spacing: -.2px;
    }

    .week-dates {
      font-size: 11px;
      color: #aaa;
    }

    .week-pct {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      min-width: 28px;
      text-align: right;
    }

    .chevron {
      font-size: 10px;
      color: #aaa;
      transition: transform .2s;
    }

    .chevron.open {
      transform: rotate(180deg);
    }

    .prog-bar {
      height: 2px;
      background: #e8e8e8;
    }

    .prog-fill {
      height: 100%;
      background: #1D9E75;
      transition: width .3s;
    }

    .days-wrap {
      display: none;
      padding: 8px 10px;
      gap: 5px;
      flex-direction: column;
    }

    .days-wrap.open {
      display: flex;
    }

    .day-card {
      border: 0.5px solid #e8e8e8;
      border-radius: 10px;
      overflow: hidden;
    }

    .day-card.all-done {
      border-color: transparent;
      background: #f5f5f3;
    }

    .day-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      cursor: pointer;
      background: transparent;
      min-height: 44px;
    }

    .day-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      min-width: 52px;
    }

    .day-summary {
      font-size: 12px;
      color: #aaa;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .day-count {
      font-size: 11px;
      color: #aaa;
    }

    .day-tasks {
      display: none;
      padding: 6px 10px 10px;
      gap: 0;
      flex-direction: column;
      border-top: 0.5px solid #e8e8e8;
    }

    .day-tasks.open {
      display: flex;
    }

    /* Task row — checkbox + text + note */
    .task-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 0.5px solid #f0f0f0;
    }

    .task-row:last-of-type {
      border-bottom: none;
    }

    .task-cb {
      margin-top: 2px;
      accent-color: #1D9E75;
      cursor: pointer;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
    }

    .task-body {
      flex: 1;
      min-width: 0;
    }

    .task-text {
      font-size: 12px;
      color: #1a1a1a;
      line-height: 1.5;
      display: block;
    }

    .task-text.done {
      color: #bbb;
      text-decoration: line-through;
    }

    /* Note input */
    .task-note {
      display: block;
      margin-top: 4px;
      width: 100%;
      max-width: 240px;
      font-size: 11px;
      font-family: inherit;
      color: #555;
      background: #f7f7f5;
      border: 0.5px solid #e0e0e0;
      border-radius: 6px;
      padding: 3px 7px;
      height: 26px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color .15s, background .15s;
    }

    .task-note:focus {
      border-color: #1D9E75;
      background: #fff;
    }

    .task-note::placeholder {
      color: #bbb;
    }

    .task-note.has-note {
      color: #1a1a1a;
      background: #fff;
    }

    /* char counter */
    .note-wrap {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 240px;
    }

    .note-count {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      color: #ccc;
      pointer-events: none;
    }

    .note-count.warn {
      color: #e67e22;
    }

    .tag {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 4px;
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle;
      letter-spacing: .2px;
    }

    .t-fs {
      background: #E6F1FB;
      color: #0C447C;
    }

    .t-ag {
      background: #E1F5EE;
      color: #085041;
    }

    .t-prep {
      background: #FAEEDA;
      color: #633806;
    }

    .t-ty {
      background: #F0EAFB;
      color: #4B1D9E;
    }

    .milestone {
      font-size: 11px;
      color: #085041;
      background: #E1F5EE;
      padding: 6px 10px;
      border-radius: 8px;
      margin-top: 6px;
    }

    .weekend {
      font-size: 12px;
      color: #bbb;
      padding: 8px 4px;
      font-style: italic;
    }

    /* Scrollable filter row on small screens */
    @media (max-width: 400px) {
      .summary {
        grid-template-columns: repeat(2, 1fr);
      }

      .controls {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 2px;
      }

      .filter-btn {
        flex-shrink: 0;
      }
    }
  </style>
</head>

        ]
      },
      {
        title: 'Week 8 — Ship It', dates: 'Mon 8 – Fri 12 Jun', miles: 'Deployed, tested, documented project with AI feature. Portfolio ready.', days: [
          {
            label: 'Mon 8', tasks: [
              { tag: 'fs', text: 'Vitest — 10–15 unit tests on business logic (not UI)' },
              { tag: 'ag', text: 'Make eval report legible — pass/fail counts + cost readable by anyone' },
              { tag: 'ty', text: 'Monkeytype time-60 — prose mode; writing the README should feel effortless' },
            ]
          },
          {
            label: 'Tue 9', tasks: [
              { tag: 'fs', text: 'Playwright — 2 end-to-end tests on critical flows' },
              { tag: 'ag', text: 'Add "recent runs" page for logged-in user — great for demos' },
              { tag: 'ty', text: 'Monkeytype time-60 benchmark + log WPM' },
            ]
          },
          {
            label: 'Wed 10', tasks: [
              { tag: 'fs', text: 'GitHub Actions CI — tests run on push' },
              { tag: 'ag', text: 'Write 2–3 paragraph agent design doc for the README' },

            ]
          },
          {

              { tag: 'fs', text: 'Polished README — screenshots, live demo link, architecture overview' },

              { tag: 'ty', text: 'Monkeytype time-60 — final push; aim for a clean personal best run' },
            ]
          },
          {
            label: 'Fri 12', tasks: [
              { tag: 'fs', text: 'Ship announcement — post somewhere or tell someone' },
              { tag: 'ag', text: 'Write up ONE hard-won lesson as blog post or README section' },
              { tag: 'ty', text: 'Monkeytype time-60 — final benchmark; log vs Day 5 baseline; target ≥ 75 WPM' },
            ]
          },
          { label: 'Weekend', weekend: true, tasks: [] },
        ]
      },
    ];

    const TOTAL_TASKS = 148;

    function getState(key) {
      return state[key] || { checked: false, note: '' };
    }

    function tagEl(tag) {
      const s = document.createElement('span');
      s.className = 'tag t-' + tag;
      s.textContent = tag === 'fs' ? 'FS' : tag === 'ag' ? 'AG' : tag === 'ty' ? 'TY' : 'PREP';
      return s;
    }

    function recount() {
      let done = 0, daysDone = 0, milesDone = 0;
      WEEKS.forEach((wk, wi) => {
        let wkDone = 0, wkTotal = 0;
        wk.days.forEach((d, di) => {
          if (d.weekend) return;
          let allDone = d.tasks.length > 0;
          d.tasks.forEach((t, ti) => {
            const k = `${wi}-${di}-${ti}`;
            if (getState(k).checked) { done++; wkDone++; } else { allDone = false; }
            wkTotal++;
          });
          if (allDone && d.tasks.length > 0) daysDone++;
        });
        if (wk.miles && wkDone === wkTotal && wkTotal > 0) milesDone++;
        const bar = document.getElementById(`bar-${wi}`);
        const pct = document.getElementById(`pct-${wi}`);
        if (bar) bar.style.width = (wkTotal > 0 ? Math.round(wkDone / wkTotal * 100) : 0) + '%';
        if (pct) pct.textContent = (wkTotal > 0 ? Math.round(wkDone / wkTotal * 100) : 0) + '%';
      });
      document.getElementById('m-days').textContent = daysDone + '/41';
      document.getElementById('m-miles').textContent = milesDone + '/8';
      document.getElementById('m-tasks').textContent = done + '/' + TOTAL_TASKS;
      document.getElementById('m-pct').textContent = Math.round(done / TOTAL_TASKS * 100) + '%';

      document.querySelectorAll('.task-row').forEach(row => {
        const cb = row.querySelector('input[type=checkbox]');
        const tag = row.dataset.tag;
        let show = true;
        if (filter === 'fs') show = tag === 'fs';
        else if (filter === 'ag') show = tag === 'ag';
        else if (filter === 'ty') show = tag === 'ty';
        else if (filter === 'todo') show = cb && !cb.checked;
        row.style.display = show ? 'flex' : 'none';
      });
    }

    function queueSave(key) {
      clearTimeout(saveTimers[key]);
      saveTimers[key] = setTimeout(async () => {
        const status = document.getElementById('save-status');
        status.textContent = 'Saving…';
        const s = getState(key);
        try {
          const { error } = await sb
            .from('progress')
            .upsert({
              id: key,
              checked: s.checked,
              note: s.note || '',
              updated_at: new Date().toISOString()
            });
          status.textContent = error ? 'Save failed' : 'Saved ✓';
          setTimeout(() => { status.textContent = ''; }, 2000);
        } catch (e) {
          status.textContent = 'Save failed';
        }
      }, 600);
    }

    function updateDayCard(wi, di, d) {
      let done = 0;
      d.tasks.forEach((t, ti) => { if (getState(`${wi}-${di}-${ti}`).checked) done++; });
      const cnt = document.getElementById(`dcnt-${wi}-${di}`);
      if (cnt) cnt.textContent = done + '/' + d.tasks.length;
      const card = document.getElementById(`card-${wi}-${di}`);
      if (card) card.classList.toggle('all-done', done === d.tasks.length && d.tasks.length > 0);
    }

    function buildUI() {
      const root = document.getElementById('weeks-root');
      root.innerHTML = '';

      WEEKS.forEach((wk, wi) => {
        const block = document.createElement('div');
        block.className = 'week-block';

        const hdr = document.createElement('div');
        hdr.className = 'week-header';
        hdr.innerHTML = `<span class="week-title">${wk.title}</span><span class="week-dates">${wk.dates}</span><span class="week-pct" id="pct-${wi}">0%</span><span class="chevron" id="chev-${wi}">▼</span>`;

        const bar = document.createElement('div');
        bar.className = 'prog-bar';
        const fill = document.createElement('div');
        fill.className = 'prog-fill';
        fill.id = `bar-${wi}`;
        fill.style.width = '0%';
        bar.appendChild(fill);

        const daysWrap = document.createElement('div');
        daysWrap.className = 'days-wrap';
        if (wi === 0) daysWrap.classList.add('open');

        wk.days.forEach((d, di) => {
          if (d.weekend) {
            const we = document.createElement('div');
            we.className = 'weekend';
            we.textContent = 'Weekend — rest';
            daysWrap.appendChild(we);
            return;
          }

          const card = document.createElement('div');
          card.className = 'day-card';
          card.id = `card-${wi}-${di}`;

          const dayHdr = document.createElement('div');
          dayHdr.className = 'day-header';
          const preview = d.tasks[0] ? d.tasks[0].text.substring(0, 48) + '…' : '';
          dayHdr.innerHTML = `<span class="day-label">${d.label}</span><span class="day-summary">${preview}</span><span class="day-count" id="dcnt-${wi}-${di}">0/${d.tasks.length}</span>`;

          const tasksDiv = document.createElement('div');
          tasksDiv.className = 'day-tasks';

          d.tasks.forEach((t, ti) => {
            const k = `${wi}-${di}-${ti}`;
            const s = getState(k);

            const row = document.createElement('div');
            row.className = 'task-row';
            row.dataset.tag = t.tag;

            // Checkbox
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'task-cb';
            cb.checked = s.checked;

            // Task body (text + note)
            const body = document.createElement('div');
            body.className = 'task-body';

            const span = document.createElement('span');
            span.className = 'task-text' + (s.checked ? ' done' : '');
            span.appendChild(tagEl(t.tag));
            span.appendChild(document.createTextNode(t.text));

            // Note field
            const noteWrap = document.createElement('div');
            noteWrap.className = 'note-wrap';

            const noteInput = document.createElement('input');
            noteInput.type = 'text';
            noteInput.className = 'task-note' + (s.note ? ' has-note' : '');
            noteInput.placeholder = 'note…';
            noteInput.maxLength = 30;
            noteInput.value = s.note || '';
            noteInput.setAttribute('autocomplete', 'off');
            noteInput.setAttribute('autocorrect', 'off');
            noteInput.setAttribute('autocapitalize', 'off');
            noteInput.setAttribute('spellcheck', 'false');
            noteInput.setAttribute('inputmode', 'text');

            const noteCount = document.createElement('span');
            noteCount.className = 'note-count';
            noteCount.textContent = s.note ? (30 - s.note.length) : '';

            noteInput.addEventListener('input', () => {
              const len = noteInput.value.length;
              const remaining = 30 - len;
              noteCount.textContent = len > 0 ? remaining : '';
              noteCount.classList.toggle('warn', remaining <= 5);
              noteInput.classList.toggle('has-note', len > 0);
              state[k] = { ...getState(k), note: noteInput.value };
              queueSave(k);
            });

            // Stop checkbox toggling when clicking note field
            noteInput.addEventListener('click', e => e.stopPropagation());

            noteWrap.appendChild(noteInput);
            noteWrap.appendChild(noteCount);

            body.appendChild(span);
            body.appendChild(noteWrap);

            // Checkbox change
            cb.addEventListener('change', () => {
              state[k] = { ...getState(k), checked: cb.checked };
              span.classList.toggle('done', cb.checked);
              updateDayCard(wi, di, d);
              recount();
              queueSave(k);
            });

            // Tap row (not note) to toggle
            row.addEventListener('click', (e) => {
              if (e.target === noteInput || e.target === noteCount) return;
              if (e.target === cb) return;
              cb.checked = !cb.checked;
              cb.dispatchEvent(new Event('change'));
            });

            row.appendChild(cb);
            row.appendChild(body);
            tasksDiv.appendChild(row);
          });

          // Milestone banner on last non-weekend day
          if (wk.miles) {
            const nonWeekendDays = wk.days.filter(x => !x.weekend);
            if (di === wk.days.indexOf(nonWeekendDays[nonWeekendDays.length - 1])) {
              const ms = document.createElement('div');
              ms.className = 'milestone';
              ms.textContent = '🏁 ' + wk.miles;
              tasksDiv.appendChild(ms);
            }
          }

          dayHdr.addEventListener('click', () => { tasksDiv.classList.toggle('open'); });

          card.appendChild(dayHdr);
          card.appendChild(tasksDiv);
          daysWrap.appendChild(card);
        });

        hdr.addEventListener('click', () => {
          const open = daysWrap.classList.toggle('open');
          document.getElementById(`chev-${wi}`).classList.toggle('open', open);
        });

        block.appendChild(hdr);
        block.appendChild(bar);
        block.appendChild(daysWrap);
        root.appendChild(block);
      });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.f;
        recount();
      });
    });

    async function init() {
      const status = document.getElementById('save-status');
      status.textContent = 'Connecting…';
      try {
        await initSupabase();
        const { data, error } = await sb.from('progress').select('id, checked, note');
        if (!error && data) {
          data.forEach(row => {
            state[row.id] = { checked: !!row.checked, note: row.note || '' };
          });
        }
        status.textContent = 'Loaded ✓';
        setTimeout(() => { status.textContent = ''; }, 2000);
      } catch (e) {
        status.textContent = 'Offline — changes won\'t sync';
      }
      buildUI();
      WEEKS.forEach((wk, wi) => {
        wk.days.forEach((d, di) => { if (!d.weekend) updateDayCard(wi, di, d); });
      });
      recount();
    }

    init();
  </script>
