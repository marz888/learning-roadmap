<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Roadmap Tracker</title>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #fff;
      color: #1a1a1a;
      padding: 1.5rem
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: .25rem;
      color: #1a1a1a
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.25rem
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem
    }

    .metric {
      background: #f5f5f3;
      border-radius: 8px;
      padding: .875rem 1rem
    }

    .metric-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px
    }

    .metric-value {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      align-items: center;
      flex-wrap: wrap
    }

    .filter-btn {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 8px;
      border: 0.5px solid #ccc;
      background: transparent;
      color: #888;
      cursor: pointer
    }

    .filter-btn.active {
      background: #f0f0ee;
      color: #1a1a1a;
      border-color: #999
    }

    .save-status {
      font-size: 12px;
      color: #aaa;
      margin-left: auto
    }

    .week-block {
      margin-bottom: .875rem;
      border: 0.5px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden
    }

    .week-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #f5f5f3;
      cursor: pointer;
      user-select: none
    }

    .week-title {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      flex: 1
    }

    .week-dates {
      font-size: 11px;
      color: #aaa
    }

    .week-pct {
      font-size: 11px;
      font-weight: 500;
      color: #888;
      min-width: 28px;
      text-align: right
    }

    .chevron {
      font-size: 10px;
      color: #aaa;
      transition: transform .2s
    }

    .chevron.open {
      transform: rotate(180deg)
    }

    .prog-bar {
      height: 2px;
      background: #e8e8e8
    }

    .prog-fill {
      height: 100%;
      background: #1D9E75;
      transition: width .3s
    }

    .days-wrap {
      display: none;
      padding: 10px 12px;
      gap: 6px;
      flex-direction: column
    }

    .days-wrap.open {
      display: flex
    }

    .day-card {
      border: 0.5px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden
    }

    .day-card.all-done {
      border-color: transparent;
      background: #f5f5f3
    }

    .day-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      cursor: pointer;
      background: transparent
    }

    .day-label {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      min-width: 52px
    }

    .day-summary {
      font-size: 12px;
      color: #aaa;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .day-count {
      font-size: 11px;
      color: #aaa
    }

    .day-tasks {
      display: none;
      padding: 6px 10px 8px;
      gap: 5px;
      flex-direction: column;
      border-top: 0.5px solid #e8e8e8
    }

    .day-tasks.open {
      display: flex
    }

    .task-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer
    }

    .task-row input[type=checkbox] {
      margin-top: 2px;
      accent-color: #1D9E75;
      cursor: pointer;
      flex-shrink: 0
    }

    .task-text {
      font-size: 12px;
      color: #1a1a1a;
      line-height: 1.5
    }

    .task-text.done {
      color: #bbb;
      text-decoration: line-through
    }

    .tag {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 5px;
      border-radius: 3px;
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle
    }

    .t-fs {
      background: #E6F1FB;
      color: #0C447C
    }

    .t-ag {
      background: #E1F5EE;
      color: #085041
    }

    .t-prep {
      background: #FAEEDA;
      color: #633806
    }

    .milestone {
      font-size: 11px;
      color: #085041;
      background: #E1F5EE;
      padding: 5px 8px;
      border-radius: 8px;
      margin-top: 4px
    }

    .weekend {
      font-size: 12px;
      color: #bbb;
      padding: 5px 10px;
      font-style: italic
    }
  </style>
</head>

    const TOTAL_TASKS = 108;
    let state = {};
    let filter = 'all';
    let saveTimer = null;

    function tagEl(tag) {
      const s = document.createElement('span');
      s.className = 'tag t-' + tag;
      s.textContent = tag === 'fs' ? 'FS' : tag === 'ag' ? 'AG' : 'PREP';
      return s;
    }

    function recount() {
      let done = 0, daysDone = 0, milesDone = 0;
      WEEKS.forEach((wk, wi) => {
        let wkDone = 0, wkTotal = 0;
        wk.days.forEach((d, di) => {
          if (d.weekend) return;
          let allDone = d.tasks.length > 0;
          d.tasks.forEach((t, ti) => {
            const k = `${wi}-${di}-${ti}`;
            if (state[k]) { done++; wkDone++; } else { allDone = false; }
            wkTotal++;
          });
          if (allDone && d.tasks.length > 0) daysDone++;
        });
        if (wk.miles && wkDone === wkTotal && wkTotal > 0) milesDone++;
        const bar = document.getElementById(`bar-${wi}`);
        const pct = document.getElementById(`pct-${wi}`);
        if (bar) bar.style.width = (wkTotal > 0 ? Math.round(wkDone / wkTotal * 100) : 0) + '%';
        if (pct) pct.textContent = (wkTotal > 0 ? Math.round(wkDone / wkTotal * 100) : 0) + '%';
      });
      document.getElementById('m-days').textContent = daysDone + '/41';
      document.getElementById('m-miles').textContent = milesDone + '/8';
      document.getElementById('m-tasks').textContent = done + '/108';
      document.getElementById('m-pct').textContent = Math.round(done / TOTAL_TASKS * 100) + '%';

      document.querySelectorAll('.task-row').forEach(row => {
        const cb = row.querySelector('input[type=checkbox]');
        const tag = row.dataset.tag;
        let show = true;
        if (filter === 'fs') show = tag === 'fs';
        else if (filter === 'ag') show = tag === 'ag';
        else if (filter === 'todo') show = cb && !cb.checked;
        row.style.display = show ? 'flex' : 'none';
      });
    }

    function queueSave(key, checked) {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        const status = document.getElementById('save-status');
        status.textContent = 'Saving...';
        try {
          const { error } = await sb
            .from('progress')
            .upsert({ id: key, checked, updated_at: new Date().toISOString() });
          status.textContent = error ? 'Save failed' : 'Saved';
        } catch (e) {
          status.textContent = 'Save failed';
        }
      }, 600);
    }

    function updateDayCard(wi, di, d) {
      let done = 0;
      d.tasks.forEach((t, ti) => { if (state[`${wi}-${di}-${ti}`]) done++; });
      const cnt = document.getElementById(`dcnt-${wi}-${di}`);
      if (cnt) cnt.textContent = done + '/' + d.tasks.length;
      const card = document.getElementById(`card-${wi}-${di}`);
      if (card) card.classList.toggle('all-done', done === d.tasks.length && d.tasks.length > 0);
    }

      WEEKS.forEach((wk, wi) => {
        const block = document.createElement('div');
        block.className = 'week-block';

        const hdr = document.createElement('div');
        hdr.className = 'week-header';
        hdr.innerHTML = `<span class="week-title">${wk.title}</span><span class="week-dates">${wk.dates}</span><span class="week-pct" id="pct-${wi}">0%</span><span class="chevron" id="chev-${wi}">▼</span>`;

        const bar = document.createElement('div');
        bar.className = 'prog-bar';
        const fill = document.createElement('div');
        fill.className = 'prog-fill';
        fill.id = `bar-${wi}`;
        fill.style.width = '0%';
        bar.appendChild(fill);

        const daysWrap = document.createElement('div');
        daysWrap.className = 'days-wrap';
        if (wi === 0) daysWrap.classList.add('open');

        wk.days.forEach((d, di) => {
          if (d.weekend) {
            const we = document.createElement('div');
            we.className = 'weekend';
            we.textContent = 'Weekend — rest';
            daysWrap.appendChild(we);
            return;
          }

          const card = document.createElement('div');
          card.className = 'day-card';
          card.id = `card-${wi}-${di}`;

          const dayHdr = document.createElement('div');
          dayHdr.className = 'day-header';
          const preview = d.tasks[0] ? d.tasks[0].text.substring(0, 50) + '…' : '';
          dayHdr.innerHTML = `<span class="day-label">${d.label}</span><span class="day-summary">${preview}</span><span class="day-count" id="dcnt-${wi}-${di}">0/${d.tasks.length}</span>`;

          const tasksDiv = document.createElement('div');
          tasksDiv.className = 'day-tasks';

          d.tasks.forEach((t, ti) => {
            const k = `${wi}-${di}-${ti}`;
            const row = document.createElement('label');
            row.className = 'task-row';
            row.dataset.tag = t.tag;
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = !!state[k];
            const span = document.createElement('span');
            span.className = 'task-text' + (state[k] ? ' done' : '');
            span.appendChild(tagEl(t.tag));
            span.appendChild(document.createTextNode(t.text));
            cb.addEventListener('change', () => {
              state[k] = cb.checked;
              span.classList.toggle('done', cb.checked);
              updateDayCard(wi, di, d);
              recount();
              queueSave(k, cb.checked);
            });
            row.appendChild(cb);
            row.appendChild(span);
            tasksDiv.appendChild(row);
          });

          if (wk.miles) {
            const nonWeekendDays = wk.days.filter(x => !x.weekend);
            if (di === wk.days.indexOf(nonWeekendDays[nonWeekendDays.length - 1])) {
              const ms = document.createElement('div');
              ms.className = 'milestone';
              ms.textContent = '\uD83C\uDFC1 ' + wk.miles;
              tasksDiv.appendChild(ms);
            }
          }

          dayHdr.addEventListener('click', () => { tasksDiv.classList.toggle('open'); });

          card.appendChild(dayHdr);
          card.appendChild(tasksDiv);
          daysWrap.appendChild(card);
        });

        hdr.addEventListener('click', () => {
          const open = daysWrap.classList.toggle('open');
          document.getElementById(`chev-${wi}`).classList.toggle('open', open);
        });

        block.appendChild(hdr);
        block.appendChild(bar);
        block.appendChild(daysWrap);
        root.appendChild(block);
      });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.f;
        recount();
      });
    });

    async function init() {
      const status = document.getElementById('save-status');
      status.textContent = 'Connecting...';
      try {
        await initSupabase();
        const { data, error } = await sb.from('progress').select('id, checked');
        if (!error && data) {
          data.forEach(row => { state[row.id] = row.checked; });
        }
        status.textContent = 'Loaded';
      } catch (e) {
        status.textContent = 'Offline — changes won\'t sync';
      }
      buildUI();
      WEEKS.forEach((wk, wi) => {
        wk.days.forEach((d, di) => { if (!d.weekend) updateDayCard(wi, di, d); });
      });
      recount();
    }

    init();
  </script>
</body>

</html>
